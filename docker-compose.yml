services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: host39
      POSTGRES_USER: host39
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-host39-local}
    ports: ["5434:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U host39 -d host39"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: { context: ./server, dockerfile: Dockerfile }
    environment:
      NODE_ENV: production
      PORT: 3010
      DATABASE_URL: postgresql://host39:${POSTGRES_PASSWORD:-host39-local}@db:5432/host39
      JWT_SECRET: ${JWT_SECRET:-host39-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
    ports: ["3010:3010"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_HOST39_API_URL: ${NEXT_PUBLIC_HOST39_API_URL:-http://localhost:3010}
    environment:
      PORT: 3002
    ports: ["3002:3002"]
    depends_on: [server]

volumes:
  db_data:
